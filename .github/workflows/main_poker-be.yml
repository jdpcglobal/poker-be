name: Build and deploy Node.js app to Azure Web App - poker-be

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        env:
          NEXT_PUBLIC_BASE_URL: "https://poker-be.azurewebsites.net"
          NEXT_PUBLIC_APP_URL: "https://poker-be.azurewebsites.net"
          NEXT_PUBLIC_SOCKET_URL: "https://poker-be.azurewebsites.net"
        run: |
          npm install
          npm run build
          # server.ts runs directly via tsx at runtime (see start script) --
          # no separate compile step. tsx resolves @/ aliases live, same as
          # local dev, so the whole import graph (socketServer, gameService,
          # models, engine) works without any path rewriting.
          # Strip devDependencies (typescript, eslint, tailwindcss, postcss,
          # @types/*) now that next build is done -- not needed at runtime.
          npm prune --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .next/
            public/
            src/
            node_modules/
            package.json
            package-lock.json
            server.ts
            next.config.mjs
            tsconfig.json
          # node_modules is included because SCM_DO_BUILD_DURING_DEPLOYMENT=false
          # (.deployment file) means Azure will NOT run npm install itself --
          # the artifact must be fully self-contained. server.ts (not
          # server.js) is shipped since it's run directly via tsx.

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4123ABE2FE4F4607A8D08B8550096AB5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C5DD7572093C49D7896C099C17E98394 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B198211BCD1346AEAD431E669211604E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'poker-be'
          slot-name: 'Production'
          package: .
