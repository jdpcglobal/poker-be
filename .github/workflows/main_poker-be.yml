# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - poker-be

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        env:
          # NEXT_PUBLIC_* vars are baked into the build at compile time on
          # this runner -- Azure App Service's Application Settings are
          # runtime-only and never reach this step. See docs/LOGS.md
          # 2026-06-16 (poker repo) for the matching bug found on the
          # Static Web App deploy.
          # Self-fetch base URL used by src/lib/admin/fetchAdmin.ts.
          NEXT_PUBLIC_BASE_URL: "https://poker-be.azurewebsites.net"
          # CORS origin for the socket.io server (src/socketServer.ts). Now
          # that Next.js and Socket.io share one process (task 7.0), this is
          # the same host as the API itself.
          NEXT_PUBLIC_APP_URL: "https://poker-be.azurewebsites.net"
          # Client-side socket connection target (src/hooks/useSocket.ts).
          # Same host -- the engine now lives inside this exact deployment.
          NEXT_PUBLIC_SOCKET_URL: "https://poker-be.azurewebsites.net"
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4123ABE2FE4F4607A8D08B8550096AB5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C5DD7572093C49D7896C099C17E98394 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B198211BCD1346AEAD431E669211604E }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'poker-be'
          slot-name: 'Production'
          package: .
          