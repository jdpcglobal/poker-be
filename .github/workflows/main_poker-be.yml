name: Build and deploy Node.js app to Azure Web App - poker-be

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        env:
          NEXT_PUBLIC_BASE_URL: "https://poker-be.azurewebsites.net"
          NEXT_PUBLIC_APP_URL: "https://poker-be.azurewebsites.net"
          NEXT_PUBLIC_SOCKET_URL: "https://poker-be.azurewebsites.net"
        run: |
          npm install
          npm run build
          # Compile server.ts to server.js
          npx tsc --project tsconfig.server.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .next/
            public/
            src/
            package.json
            package-lock.json
            server.js
            next.config.mjs
            tsconfig.json
          # Only upload what's needed, not entire repo

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4123ABE2FE4F4607A8D08B8550096AB5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C5DD7572093C49D7896C099C17E98394 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B198211BCD1346AEAD431E669211604E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'poker-be'
          slot-name: 'Production'
          package: .
